vich_uploader:
    db_driver: orm

    mappings:
        produit_image:
            uri_prefix: /uploads/produits
            upload_destination: '%kernel.project_dir%/public/uploads/produits'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        recette_image:
            uri_prefix: /uploads/recettes
            upload_destination: '%kernel.project_dir%/public/uploads/recettes'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
