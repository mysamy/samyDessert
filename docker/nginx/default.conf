server {
    listen 80;
    root /var/www/html/public;   # Symfony sert depuis /public

    # Force nginx à re-résoudre le DNS Docker toutes les 30s (évite la 502 après restart PHP)
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $php_backend php:9000;
        fastcgi_pass $php_backend;   # passe la requête au conteneur PHP
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ \.php$ {
        return 404;
    }
}
